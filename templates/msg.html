<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Received</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #303030;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 400px;
        }
        h1 {
            color: #4CAF50;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        .message-box {
            background-color: #e7f7e7;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            border: 1px solid #4CAF50;
            color: #333;
        }
        .home-link {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }
        .home-link:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Message Received</h1>
        <p>Thank you for reaching out! Your message has been successfully received.</p>
        <div class="message-box">
            <p>We will get back to you as soon as possible.</p>
        </div>
        <a href="/" class="home-link">Back to Home</a>
    </div>
</body>
</html>
